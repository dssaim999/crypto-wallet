<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>TDR X Wallet</title>
</head>
<body>
    <div class="header">TDR X Wallet</div>
    <div class="balance-section">
        <p>Total Balance</p>
        <div class="balance">$1,250.00</div>
    </div>
    
    <div class="button-grid">
        <div class="btn">Deposit</div>
        <div class="btn">Withdraw</div>
        <div class="btn">Swap</div>
    </div>

    <div class="token-list">
        <div class="token-item"><span>BTC</span> <span id="BTC">...</span></div>
        <div class="token-item"><span>ETH</span> <span id="ETH">...</span></div>
        <div class="token-item"><span>BNB</span> <span id="BNB">...</span></div>
        <div class="token-item"><span>SOL</span> <span id="SOL">...</span></div>
        <div class="token-item"><span>USDT</span> <span>$1.00</span></div>
        <div class="token-item"><span>USDC</span> <span>$1.00</span></div>
        <div class="token-item"><span>AVAX</span> <span id="AVAX">...</span></div>
        <div class="token-item"><span>LTC</span> <span id="LTC">...</span></div>
        <div class="token-item"><span>TON</span> <span id="TON">...</span></div>
        <div class="token-item"><span>TRX</span> <span id="TRX">...</span></div>
    </div>

    <script>
        async function getPrice(symbol, id) {
            try {
                let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}USDT`);
                let data = await res.json();
                document.getElementById(id).innerText = '$' + parseFloat(data.price).toFixed(2);
            } catch(e) { document.getElementById(id).innerText = "Error"; }
        }
        
        function updateAll() {
            getPrice('BTC', 'BTC'); getPrice('ETH', 'ETH'); getPrice('BNB', 'BNB');
            getPrice('SOL', 'SOL'); getPrice('AVAX', 'AVAX'); getPrice('LTC', 'LTC');
            getPrice('TON', 'TON'); getPrice('TRX', 'TRX');
        }
        setInterval(updateAll, 5000);
        updateAll();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>window.Telegram.WebApp.expand();</script>
</body>
</html>
