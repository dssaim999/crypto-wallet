<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TDR X Wallet - Ultimate Edition</title>
    <style>
        /* প্রফেশনাল ওয়ালেট লেআউট */
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        #authOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
        .token-item { border: 1px solid #333; padding: 20px; margin: 10px; border-radius: 15px; display: flex; justify-content: space-between; }
        .price { color: #38bdf8; font-weight: bold; }
        .btn { padding: 15px; background: #38bdf8; border: none; border-radius: 10px; cursor: pointer; color: #000; font-weight: bold; }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; display: none; } }
    </style>
</head>
<body>

<div id="authOverlay">
    <h1 id="brand" style="color:#38bdf8; font-size:40px;">TDR X Wallet</h1>
    <div id="authMenu" style="display:none; text-align:center;">
        <button onclick="auth('create')" class="btn">Create Wallet</button>
        <button onclick="auth('import')" class="btn" style="background:transparent; border:1px solid #38bdf8; color:#38bdf8;">I have a wallet</button>
    </div>
</div>

<div id="mainDashboard" style="display:none; padding:20px;">
    <div style="text-align:center;">
        <h2>Welcome, <span id="uidDisplay"></span></h2>
        <button onclick="logout()" style="background:red; color:#fff; border:none; padding:5px 10px;">Logout</button>
    </div>
    <div id="tokenContainer">
        </div>
</div>

<script>
    // ৪ সেকেন্ডের অ্যানিমেশন
    setTimeout(() => {
        document.getElementById('brand').style.display = 'none';
        document.getElementById('authMenu').style.display = 'block';
    }, 4000);

    // সিস্টেম কনফিগারেশন
    const coins = ['BTC', 'ETH', 'BNB', 'SOL', 'AVAX', 'LTC', 'TON', 'TRX', 'USDT', 'USDC'];
    
    // লগইন লজিক
    function auth(type) {
        if(type === 'create') {
            let phrase = "apple banana cat dog egg fish goat hat ice jam kite lion";
            alert("Your 12-words: " + phrase);
            localStorage.setItem('tdr_uid', 'TDR-' + Math.floor(Math.random()*999999));
            localStorage.setItem('isAuth', 'true');
        } else {
            let input = prompt("Enter phrase:");
            if(input) { localStorage.setItem('isAuth', 'true'); localStorage.setItem('tdr_uid', 'TDR-555666'); }
        }
        location.reload();
    }

    // ০.০৫ সেকেন্ডের মার্কেট আপডেট ইঞ্জিন
    function startEngine() {
        setInterval(() => {
            coins.forEach(c => {
                let el = document.getElementById(c + '_price');
                if(el) el.innerText = "$" + (Math.random() * 50000).toFixed(2);
            });
        }, 50);
    }

    //初始化 (বুটস্ট্র্যাপ)
    window.onload = () => {
        if(localStorage.getItem('isAuth') === 'true') {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            document.getElementById('uidDisplay').innerText = localStorage.getItem('tdr_uid');
            startEngine();
        }
        // কয়েন লিস্ট রেন্ডার
        let container = document.getElementById('tokenContainer');
        coins.forEach(c => {
            container.innerHTML += `<div class="token-item"><span>${c}</span> <span class="price" id="${c}_price">...</span></div>`;
        });
    };

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
